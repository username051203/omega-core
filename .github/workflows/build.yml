name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle 8.0
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0'

      - name: Build unsigned release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk OmegaProtocol.apk 2>/dev/null || mv app/build/outputs/apk/release/app-release.apk OmegaProtocol.apk

      - name: Delete old latest release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --repo ${{ github.repository }}

      - name: Create new latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest OmegaProtocol.apk \
            --title "Omega Protocol — Latest Build (unsigned)" \
            --notes "Unsigned APK — install via adb or allow unknown sources." \
            --repo ${{ github.repository }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmegaProtocol-APK
          path: OmegaProtocol.apk
          retention-days: 30
